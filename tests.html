<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Runner</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
    .passed { color: #4CAF50; }
    .failed { color: #f44336; }
    .running { color: #ffeb3b; }
    .suite { margin-top: 15px; font-weight: bold; font-size: 1.1em; color: #569cd6; }
    .test { margin-left: 20px; padding: 2px 0; }
    h1 { color: #fff; margin-bottom: 10px; }
    #summary { margin-top: 20px; border-top: 1px solid #555; padding-top: 10px; font-size: 1.2em; }
    .summary-passed { color: #4CAF50; font-weight: bold; }
    .summary-failed { color: #f44336; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Game Tests</h1>
  <div id="results"></div>
  <div id="summary">Running tests...</div>

  <script src="tests/test-runner.js"></script>
  <script src="game.js"></script>
  <script src="script.js"></script>
  <script src="tests/game.test.js"></script>
  <script src="tests/score.test.js"></script>
</body>
</html>
