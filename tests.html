<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Runner</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
    .passed { color: #4CAF50; }
    .failed { color: #f44336; }
    .running { color: #ffeb3b; }
    .suite { margin-top: 15px; font-weight: bold; font-size: 1.1em; color: #569cd6; }
    .test { margin-left: 20px; padding: 2px 0; }
    h1 { color: #fff; margin-bottom: 10px; }
    #summary { margin-top: 20px; border-top: 1px solid #555; padding-top: 10px; font-size: 1.2em; }
    .summary-passed { color: #4CAF50; font-weight: bold; }
    .summary-failed { color: #f44336; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Game Tests</h1>
  <div id="results"></div>
  <div id="summary">Running tests...</div>

  <div id="test-fixture" style="display: none;">
    <div class="status" id="status">Player 🐱's turn</div>
    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>
    <div class="actions">
      <button class="btn" id="restart">New Game</button>
    </div>
  </div>

  <script src="tests/test-runner.js"></script>
  <script src="game.js"></script>
  <script src="tests/game.test.js"></script>
  <script src="script.js"></script>
  <script>
    describe('UI emoji rendering', () => {
      test('initial status uses cat emoji', () => {
        const status = document.getElementById('status');
        expect(status.textContent).toBe("Player 🐱's turn");
      });

      test('first move renders cat and switches to dog', () => {
        document.getElementById('restart').click();
        const first = document.querySelector('.cell[data-index="0"]');
        first.click();
        const status = document.getElementById('status');
        expect(first.textContent).toBe('🐱');
        expect(status.textContent).toBe("Player 🐶's turn");
      });

      test('second move renders dog and switches to cat', () => {
        document.getElementById('restart').click();
        const first = document.querySelector('.cell[data-index="0"]');
        const second = document.querySelector('.cell[data-index="1"]');
        first.click();
        second.click();
        const status = document.getElementById('status');
        expect(second.textContent).toBe('🐶');
        expect(status.textContent).toBe("Player 🐱's turn");
      });
    });
  </script>
</body>
</html>
