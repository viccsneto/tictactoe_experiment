<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .test-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background-color: #5bbd56;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .test-btn:hover {
      background-color: #4CAF50;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="test-btn" onclick="window.open('tests.html', '_blank', 'width=800,height=600')">TEST</button>
    <h1>Tic-Tac-Toe</h1>

    <div class="scoreboard" aria-label="Scoreboard">
      <div class="score">
        <div class="score-label x-color">🐱</div>
        <div class="score-value" id="score-x">0</div>
      </div>
      <div class="score">
        <div class="score-label o-color">🐶</div>
        <div class="score-value" id="score-o">0</div>
      </div>
    </div>

    <div class="status" id="status">Player 🐱's turn</div>

    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>

    <div class="actions">
      <button class="btn" id="restart">New Game</button>
    </div>
  </div>

  <script src="game.js"></script>
  <script src="script.js"></script>
</body>
</html>
